<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鱼化湖回声：公开资料</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="site-body">
    <div class="page-bg page-bg-public"></div>

    <header class="site-header">
      <div class="brand-block">
        <a class="brand-mark" href="./index.html">鱼化湖回声</a>
        <p class="brand-sub">公开资料页</p>
      </div>
      <nav class="site-nav">
        <a class="nav-link" href="./index.html">游戏</a>
        <a class="nav-link" href="./archive.html">档案</a>
        <a class="nav-link active" href="./public.html">公开资料</a>
      </nav>
    </header>

    <main class="shell">
      <section class="page-hero panel">
        <div>
          <p class="eyebrow">Public Intel</p>
          <h1>公开资料与改编说明</h1>
          <p class="hero-text">
            这页把现实公开来源和游戏中的虚构改编拆开摆放，方便你核对故事到底借用了什么、又在哪一步被改造成了谜题。
          </p>
          <p class="hero-warning">
            这里的链接指向学校官网公开页面；游戏剧情中的广播、失踪案和异闻桥段均为虚构。
          </p>
        </div>
      </section>

      <section class="public-layout">
        <section class="panel public-main">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Sources</p>
              <h2>公开来源</h2>
            </div>
          </div>
          <div id="lore-list" class="lore-list"></div>
        </section>

        <aside class="panel public-side">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Adaptation</p>
              <h2>改编说明</h2>
            </div>
          </div>
          <div id="adaptation-list" class="adaptation-list"></div>
        </aside>
      </section>

      <section class="bottom-grid">
        <section class="panel board-panel">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Evidence</p>
              <h2>游戏内线索</h2>
            </div>
          </div>
          <div id="evidence-list" class="evidence-list"></div>
        </section>

        <section class="panel board-panel">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Mission Map</p>
              <h2>任务映射</h2>
            </div>
          </div>
          <div id="mission-map" class="mission-map"></div>
        </section>
      </section>
    </main>

    <script src="./js/script.js"></script>
    <script src="./js/public.js"></script>
  </body>
</html>
